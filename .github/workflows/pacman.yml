name: Generate Pac-Man contribution graph

on:
  schedule:
    # Se actualiza todos los días a medianoche UTC
    - cron: "0 0 * * *"

  # Permite ejecutarlo manualmente desde Actions
  workflow_dispatch:

  # Lo ejecuta inmediatamente al modificar main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Pac-Man contribution SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: pacman

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
